body:
  text: 忠貞録卷二明李維樾林增志同編𫝊安福劉球翰林侍講贈學士蘇子曰匹夫而為百世師一言而為天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所為故申吕自嶽降傅說為列星古今所𫝊不可誣也孟子曰我善養吾浩然之氣是氣也寓于尋常之中而塞乎天地之間卒然遇之王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辨是孰使之然哉其必有不依形而立不恃力而行不恃生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者嗚呼斯言也求之古人在漢惟諸葛公在唐惟韓文公顔陸張許之數子在宋惟文李陸張諸君子在吾朝則卓公敬其首稱焉公生而資質秀敏頴悟絶人讀書十行俱下一見棄去終身不再讀詩辭宏婉有一唱三嘆之音為文精竒警拔磊落光明類其為人七嵗時從羣兒嬉有見者異之曰斯兒骨髮殊異後日必為名公卿惜血不華色爾性至孝讀書寶香山時年十五晨昏之禮雖逺不廢㑹夜歸值大風雨昏冥不知所之得一兕牛慿之而去及歸發門乃一黑虎也時以為孝感所致既而領鄉薦登洪武戊辰進士除給事中時國初制度初立典則未備諸王服飾僣踰公乘間白上曰京師天下視效禮法綱紀攸先陛下自即位以來汛掃腥羶澄清六合蓋欲家喻户曉𫝊之萬世而無弊也聞諸王在禁中服飾尚有擬太子者然則何以令天下耶帝笑曰卿言是吾未慮及此也由是益器重公而或乃以太剛則折為戒公謝曰敬一介寒微荷上厚恩驟登清要官以諫為名吾知盡諫諍之道上不負吾君下不負所學而已禍福非所計也且吾聞居其位則思直其道道茍直雖死不可回也為之益力升授宗人府經厯冉升户部侍郎建文皇帝登極時太宗皇帝已封燕矣公密奏乘其不意請徙封之其略曰燕王智慮絶人雄才大略酷似先帝顧其為人必非久在人下者且北平天下都㑹地方廣邈士馬精强金元之興皆由于此今宜及其未備徙封南昌則羽翼既剪變無從生萬一有之亦易控制不然彼志得行則謀無不遂大舉而南建瓴東下當此之時勢如瓦解陛下孑然一身雖有一二特立之士亦無能為矣夫將萌而未動者幾也量時而可為者勢也量時而為非至剛者莫能斷未動而見非至靜者莫能察惟陛下留意焉疏入時帝坐便殿大驚手袖以入翼日召見曰卿何得出此言燕王骨肉至親卿雖慮事深長其謀當不及此公叩首曰陛下以燕王為至親楊廣之于隋文不尤親乎一旦讒言入耳父子之間遂行弒逆此豈人情也哉臣言是願陛下察之且帝王之孝以保安社稷為先小節非所論也帝默然良久曰卿休矣吾方思之事遂寢太宗皇帝南下時公已被執首責以不迎乘輿之罪曰此小臣得非前日裁抑諸王者今日爾復不臣我耶公厲聲抗拒辭甚不謹且曰先帝若依敬言殿下豈得至此帝怒欲殺之而憐其才美命繫獄欲屈其志而復官之時使中臣諷之曰今皇上帝叔也建文皇帝侄也事屬一家忠無二致公既盡心前朝何不移忠今日昔管仲不死小白魏徴再事太宗故事可師何為徒自苦耶公泣曰人臣事君有死無二足下以管仲魏徴為言此非所以望敬也夫以武王聖德而夷齊尚不朝周先帝正朔相承略無過舉一旦利欲迷心遂行篡逆吾恨不得請上方斬馬劍死得見先帝于地下爾爾復欲我臣之亦何心哉帝知公義不屈然憐其至誠猶欲生之姚廣孝不可以為陛下雖天下已定然兵革方殷若欲返駕燕都必殺敬始可方今楚王尚强蜀王富盛敬雖一介書生實英雄才略也今若生之則彼得行其志移檄諸王聲揚大義據東南之饒限長江之險鼓舞豪傑起兵北來陛下未可安枕也豈非養虎自遺患耶昔吳王不殺范蠡而蠡卒滅吳王衍不殺石勒而勒終害衍人事有幾不可失也使先帝果如敬言陛下豈有尺寸土地耶帝意遂决已而命斬之復夷三族公臨刑殊從容但嘆曰國家養兵三十年一旦變生略無措置敬死有餘罪但恨不為兵官得少行其志爾神色凛然經日如生公有髙世大才而未及大用太宗皇帝甚愛之雖為姚廣孝所譛其心實不忍殺之嘗嘆曰吾國家養士三十年不負其君惟卓敬爾公博學多能美丰儀善談論雖天文律厯地理兵刑靡不各造其奧尤邃性理有遺書十卷發明周子通書卲子經世之學詩文五十卷沒入之日一室蕭然惟書畫數軸爾嗚呼公之大節與天地日月河嶽相與悠久者自有史册書之固不俟球為之𫝊獨念自入庠序時往往聞先輩鄉先生論公忠孝之事已欲為執鞭而不可得兹來京師得公門人黃潮光之子養正持其遺書及詩文併公像以相示球拜起歔欷還其詩文且祝之曰斯集也自有鬼神造物為之相護矧吾輩後學可不保重而愛惜之也耶謹托公生平忠孝大節而證以見知聞知之實如此且以忠貞私諡之以伸生平所仰慕之意若夫行實之詳家世之美自有潮光之年譜行狀在兹不贅𫝊曰志士仁人無求生以害仁有殺身以成仁斯言在古固可數其人矣况千百世之後者哉公當建文之時死者亦非一士論者每每以公為首稱焉豈非以其見之先而守之正故耶嗚呼真可與夷齊者倫也或者謂當時兵柄在公則成敗有不可知者豈不然哉豈不然哉時宣德庚戌四月朔旦書書𫝊後樂清朱諫吉安府知府世變而節義明事久而公論定故忠義之事有晦于一時而昭于萬世者天理民彛終不可泯也吾鄉卓忠貞公敬由進士官至户部侍郎事太祖與建文皇帝遇事無所迥回避為太祖所器重言多采納如諫諸王服制事建文皇帝得其奏疏雖加驚歎卒莫能用逮我太宗皇帝天兵渡江被執不屈時使中使諭之以意將復官之公抗論弗易從容就戮神色不變帝嘆曰吾國家養士三十年不負其君惟卓敬耳仰惟太宗皇帝惜公之才而髙公之節不忍之意發自臆中特以姚廣孝所譛而決耳噫吾太宗之德嫓美武王而廣孝不識夷齊為義士者深有愧于太公矣夷齊餓死民到于今稱之忠貞公之死又有慘于夷齊者沒世之名當何如耶公沒後所著詩文數十卷時失其𫝊今無存者嘉靖癸已秋諫游南雁蕩訪先生故里得劉忠愍公球所作一𫝊于近鄉父老家父老語諫云卓公死後其女沒入官奴宣德間赦放回籍歸于梅司巡檢陶姓者其言談頗類忠貞公見者為之流涕稱曰卓氏女公死百餘年而鄉評士論耿耿不磨赤山周先生易以提學御史謫官判溫州即松臺舊祠以祀公諫拜祠下求公實事未有也偶獲是𫝊而讀之使人毛髮灑淅且驚且愕真直筆也雖或有未備而其不屈之志亦可以意求而得之矣嘉靖十二年癸已七月望日書甌寧趙秉忠邑令解元㑹魁論世者于靖難時諸臣之節率方諸夷齊愚殆不謂然夫成祖以子繼父建文以遜去國非若盟津鞠旅子姬改物而當時諸君子明委質之義者甘駢首之僇激天地之臨者騰吠堯之聲蓋人紀肇修風教斯烈髙皇帝重揭混沌而作士氣之休澤也諸君子之死事唯以白吾之無所逃而罔以詆上之取非其有故微子去而箕子奴自靖自獻于先王而已矣奚擇首陽薇哉且夫龍蛇陽九天實為之殺運未除逹者知幾聖人出必神器主使懿文不蚤世必能為泰伯之讓太祖不彌留必能為伯邑考之舍揖讓遘而諸臣可無紛紛也悲夫其時惟卓侍郎謀炳哲而就從容南昌一疏蹈刃數語讀之尤有遺憾悲夫公死而成祖褒嗟之肆今皇上益覃宥秩祀之蓋兩浙凡十有二人而公褎然為爼豆尊榮矣公瑞安人其祠在西峴之山其𫝊有忠愍之筆若遺稿若祭法咸秩秩前賢有紀余承乏兹土謁公徘徊祠下不能去稍為銓次其刻集已核其給田之逋黠者繩而籍記之以授其裔孫俾潔粢盛肅景仰因輒論白靖難時事以附于卓公𫝊後萬厯丙子書遜國臣記卓公𫝊海鹽鄭曉刑部尚書卓敬字惟恭瑞安人生質秀敏孝弟七嵗嬉戲相工曰此兒骨髮殊異必為名卿惜血不華色耳年十五讀書寶香山風雨夜歸迷失道路得一兕牛慿之歸比入門乃黑虎也洪武二十一年進士除户科給事中改元士尋又改為士源又復為給事中時制度未備諸王服乘多僣敬乘間為言上曰爾言是朕慮不及此因升宗人府經厯進户部侍郎建文初燕王來朝敬密奏曰燕王智慮絶人酷類先帝且北平者强幹之地金元所由興也宜徙燕王南昌以絶禍本夫萌而未動者幾也量時而為者勢也勢非至徑莫能斷幾非至明莫能察建文君覽奏大驚䄂手翼日語敬曰燕王骨肉至親卿何得及此曰楊廣隋文非父子耶建文君默然良久曰卿休矣事竟寢文皇帝即位責敬不奉迎乘輿厲聲不遜怒欲殺敬憐其才且繫獄或以管仲魏徴事諷敬不聽姚廣孝惡敬必欲殺敬敬臨刑從容嘆曰變起宗親略無經畫敬死有餘罪神色凛然經日猶如生夷三族文皇嘗曰國家養士三十年唯得卓敬後四十年劉球𫝊其事私諡曰忠貞敬立朝慷慨英偉美丰姿善談論凡天文地理律厯兵刑皆能究察文詩峭拔磊落所著有詩文五十卷載吾學編李贄續藏書略同騎虎記烏程沈遴竒卓敬瑞安人所居地名卓嶴年十五讀書寶香山中夜歸遇暴風雨避大樹下晦冥中迷失路遙見林外火光趨赴之乃一小院落也內有讀書聲扣其門有一童應聲而出曰先生知郎君來使吾相候敬仰視其門扁題曰體𤣥院遂入見一老翁坐長明燈下敬前揖之翁起勞苦曰深山中昏夜遇風雨得毋疑懼乎敬曰歸省乃晨昏之常恐貽吾親憂雖甚勞苦無恨但得一燭尋路即可歸矣翁笑曰山中那得有燭僅有少枯葉郎君且燎濕衣徐為之計敬起解衣問童子曰翁為誰童子曰先生不欲人知其名每向人自稱逍遙翁又問子何名曰少孤敬疑為隱君子也修謹進曰敬家只在山中往來山中甚熟未聞有體𤣥院亦未聞有逍遙翁敢以為請翁曰吾世業為醫往來中條山中後因避難聞陶隱居有丹室在此採藥南來結菴少憩不久亦還故山耳郎君無用知也頃之燎衣乾敬懇乞還家翁起謂敬曰郎君既不肯留吾有一牛可騎之而歸昏夜泥淖當有所恃無懼也敬大喜即命少孤牽牛出又呼一童子名少逸曰汝可將吾舊籠來就籠中出一僧帽謂敬曰既不能款留敢以此為贈敬辭曰吾書生將期匡濟天下闕以此相戲翁曰吾昔亦嘗有志斯世後因所輔非材不用吾謀禍幾不測得此一籠始獲解脫不然豈復能生出宜秋門乎郎君第收此帽他日自理㑹也敬堅却之翁但再三嘆息而已敬遙窺籠中諸物悉箍桶工匠所用及僧家衣鉢耳兩童送至門外敬乘牛致謝而別方出林牛行甚駛勢若飛禽不復能控制身亦安穩無恐須臾及門遙從牛背呼其家家人已寢驚起隔墻應之曰夜已向闌安得以此時冒風雨獨歸耶敬具以告舉火將牽牛入牛忽抖擻咆哮化一黑虎逸去室中人盡震驚而出比明尋訪體𤣥山居不可得數日後乃在縣西四十里陶𢎞景丹室故基傍有一古廟倣佛雨夜所經行者其壁有潘閬夏日宿西禪院詩即東坡少日所見夜凉疑有雨院靜若無僧之筆也筆墨猶新循其路歸見虎跡厯厯尚存焉見續耳談郡志修入紀異中王嘉榮曰嘗讀遜國臣編至雪菴和尚及補鍋匠諸人當時皆有契于逍遙之㫖第卓公非不知出此而以身殉國寧死無恨蓋其天性然也忠孝如公志用世如公肯與狐伏鼠竄者同日語哉說者謂宋文山之死以留夢炎卓公之死以姚廣孝嗟夫假令不遇炎孝二公遂為時用耶即不然果為頑民已耶竊意僧帽之贈籠中之示必有神焉以彰公大節詎曰試之而已按潘閬字逍遙宋初大明人為王繼恩所薦太宗召見賜進士後出入盧多遜門下多遜敗服僧服持磬出宜秋門變姓名入中條山閬素行本無足觀然始末大略頗類卓公風雨昏迷途迎接語似係閬授豈寶香山靈先知聖主將興憫公忠孝天性以發公求生之謀乎然閬之生終不及公之死矧公又非僅委身為烈若方黃僨國者嗚呼公洵無憾于地下矣鬼神恍惚難以臆决備録所聞以俟蘭臺石室採掇烏程沈遴竒沈警垣續耳談瑞安王嘉榮述參考按東莞陳公建通紀壬午六月癸亥靖難先鋒至朝陽門外甲子屯金川門乙丑入城至已已文皇即位後乃誅户部侍郎卓敬敬初密奏徙封建文莫能用至是上執敬欲殺之而憐其才謂道衍曰向者奸臣各欲首先闕唯敬諫徙封內地建文若聽其言則干戈息矣道衍曰不然南昌地居下流金陵加兵特探囊取物耳使敬言誠用陛下豈有今日于是敬遂就僇按武進薛公應旗憲章録洪武二十一年戊辰三月上御奉天殿䇿試舉人賜任亨泰等九十九人進士及第出身有差特命立石題名于太學著為令是科得卓敬齊泰按山隂陳公汝元浙士登科考洪武二十一年戊辰科瑞安三人林挺三甲卓敬榜眼郭真二甲自洪武戊辰科至萬厯戊戌科榜眼共十八人首卓敬陳汝元曰元查王世貞科試考是科第二人卓敬而俞憲登科考乃以唐震為榜眼并遺卓敬姓名今從科試考改正按浮梁陳公大綬萬厯戊申冬以浙江督學使行部按東甌屬邑令清江張公如霖訪公滴𣲖裔孫命守公祠仍于卓嶴題曰明卓忠貞公故里于滄洲題曰明卓忠貞公遷居故里于寶香題曰明卓忠貞公讀書處至今故老猶垂涕云按安福周公鳴萬厯庚申秋以東甌通守署縣事亟修公祠邑令康公繼之祠遂竣時學博開化汪公令德董其事其移文略曰卓公遭革命之初殉涣躬之志疾風徑草砥柱迥回瀾猗與聖明奬爾君之不負眷兹安固崇秩祀之有嚴顧庭柏鞠為園蔬時移事改翳披丹厄于藏碧觸景興懷云云汪公為給諫慶百之父給諫有匾以顔公之堂曰不負其君中標長陵玉音蓋橋梓倡義云祠記安福王士翹邑令南京副都御史嘗讀劉忠愍所著忠貞卓公𫝊嘆曰未雨之謀不行殺身之仁益烈公之死忠也成祖文皇帝重惜公死曰國家養士三十年不負其君唯卓敬耳則我成祖之義也微成祖不足以知公之忠微公不足以來成祖之義君篤于義臣安于忠此國家元氣所以培植渾厚億萬世無疆之休忠義實綱維之公瑞人祀公于瑞宜也前令吾邑西溪朱君祀首崇節義始即西峴山以為公祠王子士翹令是邑又從而新之創田十畝及查北壇西畔隙地嵗徴租以供祀事嗚呼精忠大節炳焉霄漢公之死義盡仁至矣向使公而弗果捐生我成祖固將柄用之况祠于後世于一邑乎崇明祀樹風教逹之天下君子以為猶有俟焉入祠拜像忠義之心有不油然而興者其為臣可知已是故祠以祀公所以教為臣也嘉靖二十四年乙已秋七月既望立永嘉侯一元江西布政使夫委贄事君有他道乎哉其始進也曰自獻其身其盡瘁也曰能致其身如此而已矣蓋致身者不有其身之謂也不有其身則亦不有其家故處平則靡室弗子若禹家無遺財居無樓臺若諸葛冦范遭變則存孤踐言碎首湛族若程荀要離刀鋸在前甘之若飴趣之若歸自世人視之以為嶄絶之行而君子由之以為經常之道也嗚呼悲夫忠貞卓公之祠乃今得烈然巋然于日月星辰之下山河大地之中領之祠官得明薦其溪毛侈之薦紳得顯著之竹帛以風于斯世斯人乎斯固常道之所以終存也蓋天有常道謂烈風迅雷甚雨非天乎不可然而光天化日其常也地有常道謂髙岸深谷之相為非地乎不可然而髙髙下下其常也人有常道謂南巢大白履霜雉經非人乎不可然而君君臣臣父父子子其常也夫革除之際靖難之師我成祖其有武王之心乎然武王不以順天應人而廢夷齊之義漢赦季布唐奬堯君素宋贈韓通皆是物也蓋收羣䇿羣力以濟事者一時之權表義存道以立經常者萬世之功乃人主自為社稷計也蓋嘗疑之夫忠貞諸公駢死參夷職耳而帝心旋霽德音屢發曰不負其君唯卓敬爾曰使練子寧在朕固當用之于是網解禁弛埀二百年而世猶難言之是故忠貞私諡也祠私祠也録私録也天下之人相率以忠為諱然則堂何以明倫諸生橫經何以請博士倚席又何以誨而常道其遂墜于地乎天啓神孫推心聖祖間者孝事兩宫因霈然下明詔酬忠魂求其後天若增而髙日若濯而明而卓公者吾瑞安人也瑞安林博士莊服行忠孝懷之久矣乃一日受詔則灑然泣躍然起走請其令長求卓氏之遺孫而録焉謂元郡人當記公事又曰始𫝊公劉忠愍公球祠公者朱令祀為之祭田為之門役者王令士翹恤録其後當奉詔以從事者今周令悠而四人者皆安福人也江右信多賢哉謂元嘗長江藩而列四賢之美亦不偶然矣又曰祠故燬莊亟走告令令亦亟圖恐後一起而新之者則杜令時登之力也于是明詔未下而官師相朂心有同然詎不信哉或曰中庸之道有蹈白創而蹈焉者未必中也按𫝊戕公者蓋姚廣孝非帝意也假令姚不蝎公公可無死乎曰烏得無死夫人臣之身社稷之身也主存與存主亡與亡是有初矣乃余于公而憬然有悟于臣道之靡他也蓋致身焉盡之矣𫝊曰求忠臣于孝子之門又曰平居則犯顔敢諫臨難則仗節死義要皆舉斯心者為之觀卓公至孝通格深夜昏迷至慿虎以為兕是天地鬼神所不能違也大忠深慮批麟于髙皇帝之朝誓死于縲絏之時嘗之以管魏之業惻然而不忍處也當是時也金石不足以喻其堅江湖不足以喻其决何哉誠以其身非我之有也夫人之未仕也其身父母之身也其已仕也其身則君之身也故古之君子之仕也或流涕以决其親故其在家必孝其在國必忠遇事則不得不諫遇難則不得不死為長吏則不得不子其民為師儒則不得不淑其人夫是之謂不二心之純故為治為教為惠愛為亷吏為直諫為死義千葩而一根萬𣲖而同源易曰係小子失丈夫故凡為吏而不閔人不禔身而自喜沾沾首鼠容容者皆有二心于其身其家者也嗟乎忠良一道耳使公先幾之言蚤用則東平德流于漢宗王季讓光于周室而身名俱全國家兩完矣謂非人臣之上願哉方今君臣父子之間大明社稷奠安萬世無弊人臣當都俞吁咈之不暇而何忠貞之慕乎然則師忠貞者師其不二心焉可也是為記隆慶六年冬十二月立新祠記侯一元嗚呼謂忠義人之性耶盟津之師諸侯㑹者八百而叩馬者獨夷齊何寡也謂忠義非人之性耶夷齊至孔子已六七百嵗而民猶稱之不置何長也余觀文武一道也叩馬于武者即前之歸來于文者也二老一心也奮于牧野者即前之興于海濱者也何哉民不救則妹邦之湯火終不能以返諸袵席而義不立則委裘之植又何以逆折覬覦者之心天地何以位而人紀何以張哉故君子終不以一時之功之大而廢萬世之義之長也始卓公之死靖難也法重禁未弛也然人之于卓公抑何勤勤乎作譜狀者則有黃君潮光諡之𫝊之則有劉忠愍公球而前後令尹于斯者得小影塑之于射圃亭則有髙君賓自黌宫即峴山而特祠之則有朱君祀增飭而亭之碑之則有王君士翹燬而復之則有杜君時登雖公始遇難時我成祖亦未嘗不冉三欲生公也而公則必之死既死矣帝又從而嘆之曰不負其君唯卓敬耳綿綿延延公論如火彌藴彌赫于是萬厯改元神孫御世推心聖祖輔世竭忠扶植世教明詔霈下恤録而祠祀之而前令周君悠奉以從事惟恐在後爼豆大張而前之私祠之者乃始得焕然于光天白日之下余嘗欣躍之以為經道之一初也卓公既與其儔共一十二人血食㑹城而峴山之祠乃獨以地形不善突聳傾斜日就圮廢有名無實又六年為嵗戊寅兵憲吳公自新既至臨蒞訪求乃下書瑞安曰卓公精忠報主大義致身千古流芳一邦增重即今聖恩被普公論大明表章埀範有司之責語絶諄懇也蓋兵憲公為治詰兵明刑成民造士靡事而不責實而今令齊君柯尤悃愊志古循吏上下一心又明年庚辰則憲節復至躬謁徘徊相與定議得官之廢址于邑治南偏百餘步南北袤三十三步有竒東西廣二十四步于是兵憲公首捐白金三十兩而餘則令尹齊君自任之不以煩民爰以是嵗仲夏之三日始事南向為堂嵗二丈一尺廣三丈六尺深四丈乃龕其中而即其左右為耳房各廣一丈二尺崇視堂殺二尺深與堂前為中門鏡堂三楹崇一丈七尺廣四丈三尺深五丈其東西為廂房各五楹共廣五丈五尺其崇一丈六尺深一丈二尺東出為祠門崇一丈四尺廣深與崇門之外東距治南官街門之內西距民居約三十六步有竒周垣繚繞爽闓雄麗丹堊維新季夏之四日遂告成事蓋役不逾月也費凡白金八十兩闕不知所從出也豈不亦子來之心而責實之驗哉夫儒者多方吏道多端然大都不過二途而已蓋治忽視諸義利而王霸辨諸名實故卓公義矣則不以身與宗易諸勤卓公者義矣則不以重法易斯固世之所以長治也名為祠卓公矣而風雨之飄搖神靈之不棲其又如實乎哉是故新之以妥神也于治前者以近民也卓公于家則至孝于國則大忠忠孝所以勸也諸所職軍國六曹之務至殷矣而風化是先者風化重也謀之以嵗者慎也成之以月者敏也其所以致力于神者如此也又况所以成民者哉故曰責實之驗而治之所以純王也於是齊君使其博士謝君國光來謂元請文其石元不佞則以平日所槩于鄙衷者文之如此云萬厯辛已嵗季冬望前五日立重修忠貞公祀記劉康祉兵部主事卓忠貞公祠在郡城北孤嶼中與文信公東西峙烈春秋時享矣而公瑞産也邑舊有公祠而以地僻左四方輪楫所不及漸蕪廢以圮給諌太末汪君以尊人司訓瑞邑來省侍暇日縱步祠中俯仰循覽墻隳棟撓苔肥草深蟲書衣佩爼豆之几雀鼠家之君亟以告司訓公公悚然不一夕寧也于是友人李林兩孝亷聞之悲且喜偕以告之署邑别駕周公周公聞之兵使者錢公咸色動神悚從事若不及㑹邑侯康公至事益以集矣而司訓公且身為之植拮据土木間雖已遷不忍離去必待其成乃已於是公之祠煥然益深閟靜宏也祠在縣治前數十武東臨孔道門標綽楔入門廣除廓然右為土地祠左為省牲之所折而北入二門左右闕縱若干尺橫若干尺而堂臨之闕尺濶若干尺中為龕則木主南面妥焉二門舊為莆田阮學諭募建工未半而偕計行今因而葺之廊廡稍加丹雘餘皆更新以天啓元年正月草五日經始斷手于又二月之晦司訓公授管于小子祉令記之夫惟公之大節不必論而獨于修祠一事咨嗟嘆羡恨古今之論忠臣義士者悼其志之芳遇之慘而不知天所以大奉之隆知其節烈之標映寰㝢而不知其功之潤被社稷也夫人主之威怒能燔炙環海亦至燀赫矣當君遜國移之日廷折真主碎玉之期已臨吠堯之語不輟于是天怒震加迅霆迸下齊斧削菌車輪轢蜋而公之七尺埃飛九族灰揚公亦真闃然泯然矣然當時吞聲痛之稍久涕泣道之愈久則尸而祝之祠而宇之敝而更新久而不衰名公巨人一倡而闤闠之羸夫寠子奮跖疾趨還顧其身未必有環堵之容其先亦未有一椽之奉而惟公祠之新敝以欣以戚也則公之身何嘗亡而宗何嘗滅於是九重之威怒不得不稍遜而忠烈之人隆隆炎炎獨神於宇宙矣或曰公則完矣倬矣然文皇帝敵讐也臣子誼敵王愾諸公之新之也亦文皇帝所欲聞乎噫諸公之新之也非為公也為文皇帝之天下也夫公非親遜國而踈文皇帝也已食其祿一往不回而身與族自殉之也夫人主匕鬯萬里所恃以無震驚危瓦危臬者人人金石之心耳今表章英烈風厲鼓動令大小逺邇咸知食焉不避之誼則人主所倚毗何如則曩之據鼎耳而宴如趨沸湯而若歸者所以護九鼎于四維之安而焚炙七族以完一念者正令聖子神孫為億兆姓之從維拘繫而不可解者也夫乃知君臣父子之義灌注宇宙間惟人之所為之惟國家之所用之欲為名誼則名誼欲為事功則事功如江湖雨露以之湔浣汚穢還之晧皓可以之滋漉含生達之鬯茂可以故若兵使者若郡邑諸公皆於軍興浩攘朝夕不暇之中而亟亟回慮於兹而司訓之薄宦給諫之旅遊兩孝亷之食貧先後補葺如捍頭目知國家之所係在此也則其心骨之磊落挺特俱可概見而公精英之所攝益深以長矣錢公暨諸公姓氏邑里踐厯及輸財助力之人姓名附左方時天啓元年中元日祭文安福朱祀邑令天下之事途雖殊而歸則同君子之行迹雖異而心則一故武王之伐不失為聖而夷齊之諫咸稱其賢我太宗奉天靖難武王也公殺身成仁夷齊也兩全其美各歸於是萬姓咸仰豈祀等一二人之私也哉顧公廟祀久曠鄉邑奚觀祀生也晚忝牧兹土爰新厥廟兼崇祀事庶綱常有賴風化攸存焉酌汨羅之水固愧籩豆之有楚採西山之薇聊供黍稷之維馨伏兾尊靈來格來歆王士翹於戲君臣大義並昭天地充塞兩間浩然正氣公炳幾先侃侃直言大厦一木百世凛然决志殱身存順歿寧從容就義庶幾成仁臣無二心維天之經如公之死夷齊等倫死矣戩谷令名暴暴國有義士社稷之福命脉精神一絲千鈞不有君子誰為干城先民如嶽公其繼作遜志諸賢與公同躅維士維令唯公是訓願言丕振此邦之運維兹安陽我公之鄉𫝊者忠愍日月爭光峴山之西芳草凄凄橫江潮汐萬古含悲明德維馨廟貌宜新崇祠有待聊薦蘩蘋按嘉靖二十四年乙已邑令王公移文月用春秋之仲日維丁後之庚舉無愆期永為定例云南海談用諫邑令維公明君臣之義决生死之途曽子所謂臨大節而不可奪之君子孟子所謂威武不能屈之丈夫孤忠大孝輝耀丹書風流餘韻振厲鄉閭用諫等忝吏兹土仰止範模維兹仲秋謹以牲帛禮祭例修勤渠維神其右諸惟神其鍳諸劉畿嗚呼自昔節義之臣恆膺褒崇之典匪獨昭一時之激勸實以植萬世之綱常故封雍齒而漢業悠長贈韓通而宋祚綿逺率是道也惟我卓公海嶽鍾英星辰列秀抗疏于革除之紀致命于靖難之朝大節凛乎氷霜孤忠貫乎日月成祖嘆賞之于先列聖肆赦之于後其視封雍齒贈韓通者益有光焉是以生公之鄉聞公之風者若于忠愍之捍虜孫忠烈之死難率相繼而作用培我宗社億萬載之鴻圖者非小補也矧兹安陽乃公故里頃值文運之衰兼以海波之振自非邀靈于先哲何以綏福于後人畿等猥以謭劣叨守封疆慨仰止之有年幸瞻拜之孔邇謹遴二分之庚式修祀典之舊伏惟忠魂不昧英爽如存為睢陽之厲鬼殄小醜于無遺振孤竹之清風起斯文于未墜江寧吳自新浙東兵巡道終南刑部侍郎嗟乎大臣事君垂紳正笏夾輔優遊此不足為難已惟夫事變將形幾先獨炳揆長䇿觸忌諱言人之所不敢及夫神器有歸綱常自任薄事功全忠義蹈人之所不為是誠天下之至難也非以一身參造化忠貫乎日月死重于泰山者其孰能與于斯今天子明聖閔公貞忠百餘年不沾爼豆而頃也敕祀追崇仰維嶽降實自甌東而荒祠淪寂曷示褒榮余忝提兵職司觀風曽登峴西景仰髙風慨寸心之激烈曠百世而感通謀諸邑令易以新宫意公之精神上薄𤣥穹而遨逰桑梓亦或眷戀于其中時惟長至初報成功余適有事于兹土又獲瞻拜其遺容薦以溪毛式展丹衷公其翩然騎白鶴而下太空也耶南昌齊柯邑令終臨安府知府海嶽之邦安固之陽一時起振古之豪傑一身係萬世之綱常公之孝聞里閭假鬼神而異虎顯其應感公之忠薄風霆貫日月而飛龍察其肺腸逮列聖之肆赦表孤節于寵章如方如干並祀㑹城而駕軼今古門生守吏專祀故里而嵗秩蒸嘗繄峴山之僻隅匪忠魂之永藏值物力之殫屈欲崇搆而未遑動觀風闕責守土以恢張卜官基之宏敞意天造闕扄以重門肅以明堂惟祈棲靈奠宅愧非繡椽闕兹孟秋之載吉迎鸞馭以來翔輝輝乎麗空之宿轉閃焰耀晶晶乎沉海之劍益露鋒鋩柯等菲劣忝司封疆展瞻依于山木陳奠酬于椒漿邀濯靈之如在振斯文以寢昌俾為士為吏者知有大節而千秋萬祀庶休有烈光康元穗邑令已未進士元穗叨蒞海邦考邑乘而景先哲雖名賢後先勛望掀揭然未有報國殉君偹兼智節抗萬乘而甘九死有如公之􅗥絶者也公以綺年掇鼎甲補拾禁闥惟邦之杰俄而真主龍飛闕報薄海之歸附方新孤臣之眷懷獨切公立朝慮危防微周詳委折賈太傅之哭涕朝內史之論列謀適不用底于杌􅑾亂不自已公可無執其咎而才賢夙著宸衷鍳徹茹周粟易商頑豈無王魏之後功可反顔而施設矧其欣崇膴而慫恿于旁者又紛㳫多通涉之舌而公慷慨悲思拊心飲血百折不回寸丹徑鐵鼎飴七尺之捐糜芥視九族之湛滅洵哉逄比之非㒞而皭然夷齊之嫓潔遂使雷霆之威始厲而終霽不負其君綸褒昭雪而天下後世為人臣子者益曉于委質無二之義謁公祠下誦公遺文不覺其低徊而永嘆嗚咽然則公雖長逝而維綱植紀功在人寰且浩氣磅礴凛風霜而炳日月公之英靈殆閲千萬祀而未始消歇者也安陽故里神棲斯悅澗芷溪毛以薦芬飶惟司牧之告䖍敬摛詞而揚烈忠貞録卷二
