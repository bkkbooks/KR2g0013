body:
  text: 忠貞錄附錄奉常黄公傳黄養正瑞安人名蒙號志彀以字行父潮光官國子學正為卓公敬門人敬死靖難潮光為著年譜行狀并収其遺像嗣後養正持之乞劉忠愍傳養正自幼岐嶷聰慧善楷書七嵗随父赴京永樂中引見授中書舍人朝廷碑刻宫殿坊扁多其所書性尤端謹愽學工詩文宣宗皇帝甚愛之南還時執手賦詩以别正統七年任太常少卿已已之變先事陳諌弗從乃扈駕於土木也先衝逼行營臣屬無不驚怖養正獨毅然衞䕶無所畏避至駕北狩慷慨死之衣冠歸葬天順初追贈太常卿仍錄其子世襲錦衣衞百户以旌其忠見郡邑志再考大明一綂志送黄養正二首厯事三朝聖曾蒙當宁知手持五色筆常在鳯凰池雪霽城南路春融栁外澌還家自足喜報國豈應遲文明門外栁頻折送人歸竊祿吾何補懐鄉志屢違越潮天際白呉樹雨中微羡爾乘仙舫東南去似飛見東里集孝亷陳公傳陳茂烈字時周世居瑞安嘉嶼鄉五十都大坑山祖以軍功注籍福建興化衞總旗時周髫年徃繼父戎役遂棲郡梅峯厲志邁俗不與羣兒伍晝入公署夜歸讀書祖母憐其孱弱亟止之乃韜燈黙誦不少輟年十八慨然嘆曰善學聖人者莫如顔曽顏之克已曾之日省豈非學之法與乃作省克錄登𢎞治丙辰進士奉使廣東拜白沙陳公獻章願執弟子禮白沙與之語累日且告以為學須静一又退而作静思錄其自叙畧曰水動則波波則溷止則澄澄則照故波雖不與溷期而溷自至澄雖不與照期而照自至動静之分也觀水可以見心矣是以貴静思也孔門顔曾后若周濓溪氏者志慮髙潔黙契道體亦以思為聖功之本又云静則虗虗則明明則通嗣是伊洛闗閩動静夾持内外交養咸恪守此道士欲希聖賢而尋向上去可不從這裏做工夫耶初授吉安府推官持大體開至誠通以民彛之懿豪家利寡婦財誣許婚斷從守志夫制悍妻嫁有娠妾既生子歸承其業族人争之驗與姊類争者愧服又吉俗徤訟一詞所逮多至百十人乃下令告者無得株連妨生業及訊鞠則親召至膝前以理辨折不妄施刑民亦往往輸情去時郡守嚴擊强豪徐輔以寛當道尚深刻徐開解得寛霽信孚上下考績歸至淮乏寒具凍幾死所知覆以敝裘為救召入為御史恪慎供職冠服朴素借人一牝馬乗之身若無官然大臣有縱子受賕者言官交劾不違茂烈申糾其罪勒致仕崔志端者起道士為尚書再疏論之謂以羽流而任天子喉舌股肱辱國之甚莫逾于此不報乃以母老乞歸終養疏曰臣生十三年父善祥不幸蚤喪母張氏無任劬勞臣又隻身别無次丁孤苦成立臣前任吉安推官母年雖髙尚能就禄繼䝉聖恩行取來京母年逾老重違故鄉臨别叮嚀言語悲切臣待罪於兹將二年矣顧以菲才無補風紀又蒙聖恩錄臣前任微勞賜之勅命舉家幽明咸被天寵即擬捐糜莫能報荅奈慈闈衰邁夕照如飛君恩尚可以再酧母年不可以多得况臣未有男嗣又無弟兄一母一子各天一涯千思萬思無時不思疾病獨自呻吟藥餌誰為調節臣既思母則報主之心亂母復思子則保身之心微臣心可憫母心尤可虞也伏望皇上憐臣母子至情放臣終養使得蚤慰倚門之望少伸寸草之忱臣雖祗奉親顔仰瞻天日尚祈涓埃之報於將來再効犬馬之勞於未死矣詔從其請歸家力供甘㫖短床敝席不辨一蚊帳身治畦一蒼頭給薪水出則自執小油葢太守閔其勞遣二力助役時周白守還之母使野人添事而溢口食也妻子服食麤糲一女適彭惠安孫輔嫁具涼薄皆人甚不堪者則㤗然自足日坐斗室究極五經四書之㫖體騐身心隨得随錄嘗云儒有向上工夫詩文特土苴耳正徳中吏部以茂烈養母清苦奏改為晉江縣學教諭資其祿疏辭不拜又援侍郎潘禮例請上特令有司月給米三石以資孝養又辭曰陛下隆孝理之化長清白之風下逮微臣亦荷収恤豈獨臣一家之幸而已第念臣家素貧寒食本儉薄故臣母自安於臣之家而臣亦得以自遣其貧非誠有及人之亷盡已之孝也古人行傭負米皆以為親臣之貧尚未至是而臣母鞠臣守貧居寡艱苦萬狀臣雖勉盡心力之義竟未酧涓滴之恩且母年已八十有六來日無多返哺至情固欲自盡資養月米心竊不安上不允茂烈以母年九十未有嗣息日夜為憂方抱疾而母卒强起號哭寢地疾轉亟亦卒林少保見素為治殮具立其族子逺揚為後先是正徳初歸瑞安省墓擇二族子以行惟逺揚可教留而教之至此乃立焉海内大夫士聞而傷之御史王應鵬薦云廉約如石守道而所養獨純孝行如徐仲車而所處尤困詔表宅里曰孝亷優恤其家見素曰陳公領悟既深而充養亦熟隐𠂻粹行對天地質鬼神鄉國敬服殆黄憲管寧之流也見邑誌再訂興化志及鄭端蕳李卓吾名臣記陳建曰按陳孝亷終養一疏冩出母子至情無一毫粉飾長語至今讀之猶令人酸咽興感想當草疏時未嘗不肝腸摧裂涙随筆堕不能為心之甚也偹錄此疏當與李宻之陳情表同埀不朽云與陳進士時周書時周菽水之養自埀髫迄今埀三十年韓退之稱孟東野無田而衣食事親左右無違混混與世相濁獨其心追古人而從之時周盖有之矣時周别去益思時周平生履厯之難大畧與老朽同而又過之求之古人如徐節孝者真百鍊金孝子也頃闕老母生日詩云有母年齡暮闕儀焉敢却揣分故難任錦叚拈香拜僊醅洗盞斟獨慙非節孝未了百年心因事惟賢寄不足於詞詩中發之盡矣抑聞之子不私於親非子也士不明於義非士也賢者外取舍之宜以事親盡愛日之誠與深莫及之悔在我而已見從祀真儒忠貞錄附錄
