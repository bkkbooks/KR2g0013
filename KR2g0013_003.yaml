body:
  text: 忠貞録卷三明李維樾林增志同編悼忠詩曹睦翰林庶吉士朔吹驚朝捲赤旌孤臣持節值艱貞綱常賴振千秋重生死真如一髮輕心對蒼蒼誠激烈身殱汶汶獨揚清同𫀆不減塤篪雅愁聽山陽笛裏聲楊景衡福建左參政主聖臣忠未易論運扶義仗漢乾坤慿將國是輕生死俯却宸衷一眷存不盡斷魂歸帝所孑遺孤女荷君恩雲飛古渡間來去天際長江自吐吞韓偉四川御史力竭扶天腕折時此生肝膽有誰知髙風能起千夫懦壯氣端非寸鐵移北斗精光應未散南昌遺事最堪悲直將許國丹心在猶與絪緼塞兩儀項旻建陽縣知縣綱常千古重君親臨難慿誰屈此身孝感有靈扶虎背忠言無忌逆龍鱗五宗已逐孤臣老一女還叨聖主仁壯志未酬豪氣在空隨明月度城闉任道遜太常卿蹇蹇忠誠耀北辰髙祠萬古仰明禋天生英武能平亂公為成仁敢殺身宇宙有靈埀竹帛風雲無際展經綸不須更采西山蕨溪藻年年得薦春蔡鼎太理寺副孤臣孑立變俄臨萬古綱常定力任徑血直教當輦轂肢骸何憚潤刀砧名山巨海培英爽白日青天照赤心公論不磨祠廟肅風霜凛冽柏森森周令通政使鼎湖龍馭晏髙皇靖難雄師震北方四海撫心安社稷孤臣張膽任綱常事為已逐風塵化奏對猶爭日月光正使夷齊論伯仲敢將王魏問低昂李釗九江教授金陵雲暗走沙塵靖難王師逼盟津共擁玄黃依鳳翼獨持丹赤逆龍鱗矢心不作殷庭客碎首甘為洛邑民風撼西山明月夜至今猶為淚沾巾黃思親撫州府同知長干秋色草離離劍化青山杳莫追生氣百年回板蕩先幾一疏係安危國家養士洵無負海嶽鍾靈綽有竒却恐丹忠描不盡襄江如訴似公悲程豫莆田訓𨗳髙風曽憶首陽山仰止如公不可攀九族頓虛精化碧孤臣埀盡淚成斑逆鱗今日猶驚膽褒語當年尚霽顔耿耿英魂隨鶴去月明華表幾時還鮑鐸常熟教諭仗義英聲振廟堂孤忠獨為植綱常從龍忍敢忘鍾阜叩馬寧甘等首陽百鍊丹衷天共老千秋青史日爭光寶香卓嶼尋遺迹屈指誰人可頡頏何格沂州知州日落鍾山草色蒼朔風吹雨暗長楊杓沉龍闕雲雷厄星焰旄頭劍戟光桑土有謀人自闕經不墜死何妨至今白露洲前水洶洶東流與恨長林桴石城府教授敢爇心期一瓣香峴山祠下拜清光兩朝知遇恩榮重百代瞻依感慨長正氣蚤收還海嶽丹衷元不愧穹蒼巫陽遼邈忠魂渺獨對西風為涕滂朱綽吳縣訓𨗳仰止英標覺凛然孤忠耿耿日星懸不隨王魏收功業直與夷齊照簡編風靜大江天已定雲連髙嶽恨猶牽故墟荒草應無問千古衷情託杜鵑吳綸湖州府學訓𨗳天挺英豪海嶽竒貞標蚤識始髫時曽慿虎背徴原異更逆龍鱗苦獨持卓嶴千秋留正氣寶香一脈寄遐思干逄心事崇朝剖豈待西山餓伯夷項㺭邑學生一死報君臣節盡兩朝抗疏寸衷孤青編歷歷從頭數忠智如公幾丈夫李師言惠州府通判莫向當年問革除非關桑土計全疏周家鼎運天方屬嬴得綱常竹帛書吳鎮思恩縣知縣卓峰屹立碧江臯間氣鍾成名世豪赴義已甘探虎口捐生何啻等鴻毛驚聞遺女還墟梓忍見窮碑沒野蒿一點忠貞昭萬古空江長使鬼神號秦激湯溪訓𨗳忠義知公自秉常非于分外著毫芒胸中已信同金石天下何妨有鼎鐺本學臯夔崇揖讓欲回湯武復虞唐遭時不偶違心事到底夷齊是頡頏陳大訓郡庠生孤祠肇桑梓空山儼遺靈俯瞰海東注仰觀星北傾寶香舊慿眺咫尺煙水平馴虎禔篤孝逆鱗值艱貞元會適陽九未雨憂滿盈良臣不可願叩馬誰敢攖憐才荷宸眷殉節寧偷生矢死靡孑遺宇宙存精英報主誼無二天王奄聖明厯嵗億萬祀綱常與之并公生際革命三仁齊令名吠堯與食周此理將安評顧求寸心靖疇識太山輕倬彼盧陵傳感激同純誠吁嗟忠與孝末世徒涕嬰鄒魯悵頽運頑懦振希聲冠裳玷兹土能勿汗沾纓虞書恩貢靖難忠祠何處尋窮碑髙臥峴山隂風雲忽訝飛龍會鼎鑊難回叩馬心四海有天人共戴孤臣未雨慮應深國家養士分何負赫赫明謨已賞音薛繼忠霍山知縣吾鄉挺先哲公儲間世精寶香讀書處浩氣浮太清慿虎感至孝移孝輸忠貞培植自髙廟幾微宸慮嬰天造值草昧雷雨已滿盈豈不炳厯數豈不懷聖明許身既有屬念之當誰傾臣忠主所眷節殉死彌輕公生有殊表公死凛如生其君洵無負天語華衮榮百載緬桑梓崇朝軫皇情褒祀渙大號爼豆遡靈英弭節下帝旁首陽希芳聲人綱賴以柱爭似兆庚庚林萬梅南陽通判國步爭如革命時惟公抗疏冒艱危採薇清節元無二徑草孤忠更有誰家逐斷雲飛古渡心隨寒月照荒祠盧陵遺傳千秋在讀罷令人涕泗埀以上俱邑人作載舊刻周鳴原任辰州推官符命非無定鑾輿已改音謨言徒懇惻死節豈推尋惜士回光霽成仁倩孔壬臣綱存烈烈國脈始森森北拱皇圖壯東潛忠魄深山名齊墮淚廟貌逈寒心英爽長松挺精誠旭日臨獸趨猶夜返霧散若清吟爼豆由殊典掃除自所欽恍知神妥處風色動靈襟康元穗千秋生氣奕瞳矇沼沚褎然爼豆崇白簡霜飛銀界凛丹衷風烈紫塵蒙香山隱隱徴慿虎易水蕭蕭直貫虹吾向滄洲尋劍樹芳魂應作怒濤洪張德明廣東參政繄惟革除際天意何分明一以昌帝圖為世開太平一以立臣極為道扶忠貞偉哉卓夫子仗義甘捐生砥柱屹然立坐障滄溟傾綱常既標表日月迥回光精乃知有自來于事良有徴當其童丱日純孝根天經深夜馭虎歸呵護煩山靈在生為烈士在天為列星餘徑鼓噫氣猶足鞭雷霆明也産公里眷言跂芳聲采采西山薇糅以沅湘蘅再拜寶香麓佇立獨屏營天風灑毛髮恍見來霓旌林必成郫縣知縣慷慨英風當國危殷憂曽進徙薪辭人言聖主承家日我謂孤臣致命時一木難支千古恨寸心不負九重知至今卓嶴峯前過春雨年年喚子規劉康祉文皇龍戰定垓埏九廟鐘簴儼不遷薄海金甌歸共主孤臣玉碎肯移天生前灝氣馴彪虎千載英魂繞杜鵑化鶴猶歸故鄉否忠貞祠廟海雲邉陳堯言已未進士當年國事際亨屯不負丹心屬老臣純孝肫肫馴虎性孤忠耿耿逆龍鱗桐封若就先幾疏楓陛誰蒙後日塵千古首陽昭白雪仰公髙節獨嶙峋周應期禮部主事綱常負荷此孤身忠悃先教逹紫宸薪徙預謀安社稷鼎烹濱死見君臣留丹一寸心如結化碧千年血有神讀罷遺編倍惆悵不堪杜宇正啼春李光春廣信府推官為君為國為綱常恨不兵權借上方觀變密謀防北邸審時先計徙南昌飛龍天錫英君祚逐燕人悲烈士亡落落忠魂何所傍千秋星斗夜光芒李維樾遜國踐阼初扶桑始昭晢陽德云乍亨彌綸見章臬公抽五色絲欲補山龍闕便殿陳嘉謨幾先􅖏萌枿家令空綢繆賈生何憤切帝運方屬燕閏紐埀已齧御闥倐焚如禁門幾蹀血率土孰非臣旅進隨茅蕝固非公所能臨危甘仗節回天力不任吠日聲難輟蘭隕芳未捐玉碎光逾潔至今襄江濤悲風為嗚咽神廟涣綸音精禋表忠烈編摩録遺文耿耿懸日月邑子挹餘芬焚香讀苔碣溪毛薦芳鮮寒泉潄清冽林增志髙皇尺箠掃羣孽六龍南飛御天闕手挈神器歸文孫兩戒河山開日月燕國黃旗髙彗雲南內闔宫俄自焚徙薪不救燎原勢孤臣淚雨空紛紛阿誰了鳥具章服望塵雅拜迎新君新君自是髙皇子人道一身可無死孤臣頸血偏逆流要濺新君御袍紫血凝為碧炯不磨千古英英照青史國家養士三十年不負其君今有士安陽遺祠蘋藻香忠魂歸兮歸故鄉我歌九歌擊如意恍見騎麟來大荒忠貞録卷三
