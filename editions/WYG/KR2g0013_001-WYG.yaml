body:
  text: 忠貞錄巻一明李維樾林増志同編古詩梅雨潭横空峭壁㵼飛瀑聲震淵霆揺地軸絪緼氣濕浮太空衝崖散作珠萬斛源頭直與銀河通半空簸落花流淙此境定知無炎熱萬壑千巖洒晴雪溪山行贈友人溪山行行失路浩歌溪山怒山髙旣莫陟水深豈能渡水深㳺蛟龍山髙哮虎狼虎狼叱咤不可聞蛟龍贔屓奚可當山自髙水自深抱琴何處求知音知音旣遇心神閒為君説盡行路艱溪山路鄙小行行勿復道蛟龍虎狼纔傷夷與君直上青雲梯五言律陳叔起畫野徑通禪刹溪流沒釣磯小舟衝浪出幽鳥背人飛逺樹浮蒼靄空山淡落暉竹廬吾所愛眞與世相違七言律西施菊返魂香幻作秋叢賞識東籬靖節翁粧濕有㾗凝曉露酒酣無力倚西風恃姸曽得夫差寵雪恥先來范蠡功千古館娃遺恨處清吟難與洗妖紅寳香此室不如斗來大此心不啻天様寛白雲忽去山在户紅日乍晴人倚䦨一聲两聲花鳥好千樹萬樹松風寒詩成大笑出門去長空浩蕩江水渾贈周孟秩考滿之京計吏循良籍籍名驅車就道馬蹄輕九重雨露沾衣濕萬里山河映日明步入翠華㸔殿最班聯玉笋沐恩榮䇿勲樹伐男兒事竚見褒書下帝京元旦送鄉兄襄陽守鮑東園囘朝長樂鳴鞭曙色開履端輯瑞逺臣來闕祥雲合玉佩初臨闕寳厯新㸔闕星蚤已見中台鈞天更聽昇平曲湛露承闕夀杯七言絶句晚眺浣花溪上雙楠木老杜草堂生夏寒門外青山三十六讀書終日倚䦨干墨竹洞庭木落水生波月入斜忩露氣多虞闕秋自晚滿江煙雨泣湘娥墨菊我向𤣥都逄羽士自言種菊不多根灌園只汲臨池水嵗嵗開花帶墨㾗紅梅誰教姑射飲流霞爛醉西湖處士家㡬度春風吹不醒至今顔色似桃花梅影華光淡墨鵝溪絹不似天公巧絶竒碧水晴沙風定後空山茅屋月明時二月梅毎日尋芳盡醉歸溪隂沙岸忽横枝暗香浮動梨花月春色平分正此時落梅山中昨夜東風惡詩客柴門向晚開狼籍一庭春意思半飄風雨半依苔栽梅風流東閣題詩客瀟灑西湖處士家雪冷江深無夢到自鋤明月種梅花題扇夜入瑶䑓㸔明月吹簫惟有董雙成碧桃花外人騎鶴報道天書下玉京山水長松雨過秋隂滿日日攜琴自徃囘安得扁舟乗晚興載將山色過江來春興杖藜徐步出門去好花無數媚巖阿摘花歸去不成挿坐對芳池春水多又雨過前山花寂寂日照嵐光翠欲滴長嘯一聲隂霧開習習清風滿巖壁序送周孟秩之任序洪武已已孟春周君孟秩世居温之瑞安溪西世家由人材舉授永春縣丞有政聲考最欽受朝命陞知河間寧津令歸鄉里省墓而行邑縉紳之士平昔與君交㳺者皆歌詩以餞之祖筵旣陳予為序乃酌酒而告之曰昔者聖門髙弟子賤之治單父終日鼓琴而大治子㳺為武城宰以禮樂為教夫子聞而韙之周君生長衣冠之系詩禮之𫝊固有本闕學聖人之道則是聖人之徒也觀闕資質醇厚倜儻有為學旣乆措諸政事其設施必有大過人者今也製錦扵斯固未足以盡其才也雖然郎官出宰百里上應列宿當思所以忠君愛民之道以對揚天子之休命也幸勿以一邑如斗而屑意焉吾聞子程子有言曰使民各得輸其情正已以格物斯言足為後世法君今莅政寧津以禮樂為教不欺扵心毋怠扵事化成俗美使民為三代之民而樂聖朝雝熙之治則君不負所學而循吏可㡬詎容二賢專美扵前而已乎他日言治邑亷能有聲者必吾孟秩也敬忝辱令先君之德故贈言不以頌而以規并系之以詩云分符百里信非輕果爾鶯遷寵渥榮邑屬寧津稱大地政成單父擅嘉名門前柳拂疑僊令境内花明是錦城顧我相知年已茂闕交情趙氏遺芳集瑞安峴西趙廷暉氏集鄉之縉紳先生遺其先君子德深甫詩文若干首及甫歿銘誌鄉人哀悼惜之詞文若干首帙成請名扵予予閲之歆甫之德布而髙廷暉氏之為因名之曰趙氏遺芳集又重為之序云趙為宋室之後南渡去古汴而散處江南若吾温之永樂瑞平皆籍浚儀為秦王𣲖下至今譜牒班班可考由德深甫以上皆葆光弗耀信乎奕世之𫝊明脉經稽本草祛疾活人其所施者博而獲濟者廣矣因是德稱扵人嗟歎不已而咏歌之大篇短章金玉交奏誦之使人毛骨森竦恍然見眉宇挹光霽而不知九京之限也吁今不可作矣見其集尚能使人歆慕而况當時聆其緒論沐其德澤諸君子之有作也宜矣雖然自非賢子孫寳輯而類集之則將為覆醯醢穴蟲䑕如電光泡影之不常焉能保之以示諸後乎若廷暉氏之為可謂知所務哉後之人尚當以其心為心則遺芳之集𫝊之愈乆而愈有光焉詩曰永言孝思孝思維則竊敢誦斯語以為趙氏遺芳集序墓誌眀贈奉政大夫脩正庶尹禮部郎中繼道先生葉公墓志銘洪武歳乙卯臘月三日繼道先生葉公卒迺孤思永奉先志舉柩安厝于里之紫華山西谷峯下後十餘年思永與余同官京師公以子貴追贈禮部郎中思永因持公行實乞余銘公墓余不克辭按狀公諱葵字叔向號雲泉逸民其先南陽楚縣南頓鄉髙貴里人漢大中大夫諱望者徙丹陽句容晉蒼梧太守諱儉者再徙栝之松陽𫝊諱仁㨗仕唐殿前都押衙避五季亂復徙温之瑞安郭公洋紫華山遂世家焉公曾大父諱鈺登仕郎大父諱貫道考諱堡翁三世皆以孝行聞母汪氏生公扵元大德丙午二月十六日㓜岐嶷警敏殊異常兒人咸謂世德之祥徴年十八而失怙越三年母汪夫人繼違飬二弟一妹猶在提抱中公思厥考遺訓稽古力行攜弟妹卜廬於前州治西峴山下教育之俾成人閉户十餘年玩索羣籍窮探義理毎終日危坐反身以求誠超然有得扵窮理盡性之要嘗曰予始知道時思周子不除忩草張子聽驢鳴與自家意思一般猶判物我為二及見得此理眞徹上徹下與自家道理觸處皆然方此是學著眀辨工程三十七篇性理粹語易學精微各一巻皆研精太極隂陽鬼神性命之奥又述濓洛宗𣲖六巻異端辨三十七條括之以理証之以聖賢之大道治平䇿畧二十四篇所言皆鑿鑿有經濟詩文各自為巻有鏡清紀拙隨寓吟稿白石陶咏千餘章序紀銘䟦雜著若干篇什忠義如宋文丞相鄂武穆王各序其事而系之以賛晚復作逸民𫝊未就而公已捐賓客矣公之學以敬為主以静養為功夫反求諸身心而務為深造體騐故言有根㨿而文有實用非剽襲影響者倫也風度竒偉識見超卓至正初時尚承平公與昆陽趙伯起登峴山憮然曰後數年天下將有變乎吾不能與君優㳺如此也故不樂仕進酌古議衣冠之制曰當何如而為朝服何如而為官服何如而為斯民之服至其身之衣冠巳自異常人及我明興改制度如公所議者居多故趙君送公門人任清之叙稱公有先知厥配峴山董氏有異母弟㓜失怙舅氏臨終以孤託公且令均其貲産公惟經紀其家一毫無所取仍以妹歸其孤而厚遣之畢二弟婚尤盡友愛至正庚寅山海寇表裏猖獗迺攜家避地南塘十餘年志行益明不為憂患所移丁酉徙寓鹿城六月晦大風雨壊民居數萬間公寓亦壊永嘉林鶴舟雅志好士明日歴唁諸縉紳皆有所不堪惟公掇拾遺編風雨中從容自若林退謂人曰吾見葉先生眞有道者氣象他人莫及也毎出城市經㳺丘壑時人爭先覩快輙以神仙目之一時名公若郡守三寳公柱御史中丞章公三益叅軍胡公仲淵咸敬慕而師事之三寳公前守瑞安與公鄰居不克見及守郡旣去處松山因友人求與公交一見歎服以為天地之髙厚山川之融結浩蕩日月星辰之照臨著明方諸公之人品豈虚譽哉章中丞始鎮栝即率子弟同受教尋延至龍泉匡山書院講學俾子藴德依歸焉胡叅軍迎入栝軍敬事尤謹栝士大夫聞公至爭就問學胡公遂梓其明辨工程廣授學徒栝人任清胡公將校也氣剛岸年逾四十求受學公抑而教之卒能悉去豪習一歸静專後遇難為忠義士公生平未嘗言饑渴倉卒起必整書輯杖屨晝必焚香讀書夜必與子孫講觧一食一息有法雖造次顚沛不可亂門人鄭君希誠善學而知道者謂公氣象如程伯子後生宜及時親炙人服其言國朝吳元年大兵克温城公歸紫華山結廬巾山下塘邉娛情花竹泉石復居白石山逍遥山澤中世事艱危征役煩窘不以介諸意惟知抱道自樂以終餘年粤乙卯得少疾揭書張子西銘扵壁臥其下語迺孤以死生晝夜之説諸族人昆弟羅床下與語如平日尋起如厠整衣復臥俄然端視而逝享年七旬公少孤事大父母至孝處兄弟宗族盡恩意學無師傅而造詣獨精純其持敬之功性命之説足以叅同濓洛一時四方學者景從焉及卒從弟蕃私旌之曰繼道先生嗚呼名其稱情矣配董氏夫人有淑德善相善教與公歴艱危播越無怨嗟公刑家之道又有徴也男一鼎字思尹改字思永以明經薦與余同登洪武第一科甲子觧榜授魯府長史歴國子司業禮部郎中秩秩有聲娶塘坊唐氏繼陶山張氏側金氏孫男五操庠生揀捐擬蘄女孫一勤適陳侃曽孫男十二首尊益芳著吕妥孚隱滔統終併系之銘銘曰濓洛風微異説擾擾正路榛蕪孰與扵道紫華孕精篤生哲人不由師𫝊咀嚼道真敬以持心靜以養性精一之緒克紹其正抱道而隱以全而歸有子榮褒西谷山輝忠貞錄巻一
