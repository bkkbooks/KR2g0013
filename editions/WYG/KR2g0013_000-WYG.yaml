body:
  text: 忠貞録傳記類二名人之屬提要臣等謹案忠貞録三巻附録一巻明李維樾林増志同編維樾字䕃昌増志字可任俱吉州安福人是編為其同里卓敬而作卷一為遺稿凡詩十九首序二首誌銘一首而冠遺稿序巻二巻三為後人記載題詠詩文而附録黄養正陳茂烈二𫝊皆敬鄉人也然養正為敬門人又死于土木之難其附録為宜茂烈與敬别無淵源而又以棄官養母終于鄉里其事截然不類附之忠貞録中名實舛矣敬非惟死節慷慨震耀千古即燕王來朝之時宻請乗其不意徙封之于南昌計亦良善其疏雖無完本然劉球所作𫝊中尚載其畧不録之于遺稿中亦編次之疎也敬在明初不以詩名而所作落落有氣格如五言之小舟衝浪出幽鳥背人飛七言之白雲忽去山在户紅日乍晴人倚欄絶句晚眺云浣花溪上雙楠木老杜草堂生夏寒門外青山三十六讀書終日倚欄杆題山水云長松雨過秋聲滿日日攜琴自往回安得扁舟乗晚興載將山色過江來栽梅云風流東閣題詩客瀟灑西湖處士家雪冷江深無夢到自鋤明月種梅花亦皆有致惜其所𫝊不多不能自為一集故仍從崔與之集例入之傳記類焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀忠貞錄原序忠貞錄者何李君維樾林君増志褎其鄉先逹卓忠貞公所為詩若文而輯之并褎其後之悼忠貞詩若文而並輯之而以黄陳两先生事附載焉輯公詩若文昭文獻也重忠貞也輯悼公詩若文志公義也篤景行也附黄以死難則忠彷扵批鱗附陳以陳情則孝嫓乎馮虎諧臭味也公識慮超羣大節不奪才猷智勇集扵厥躬而以翰墨求之僅百分一耳且扵書無所不窺吐詞為經自足垂雲漢而驟風雨倘獲覩其全書必有可備一代之典者而以無意為文或志存乎削稿有心忌諱或恐匿其遺言欲尋隻字片紙扵二百餘年之後竟寥寥焉以兹集求公之翰墨又百分一耳則兹集似不足重公乎余曰不然夫文與行非裂而二也故曰詩言志言之無文行之不逺夫少卿河梁之別淺視漢恩仲宣從軍之行盛稱魏德此為詬厲安用文之然而墨允采薇爰歌虞夏左徒沉汨乃賦離騷陣雲邉月之悲守睢陽而畢命闕之弔望柴市以甘心氣與秋日爭髙詞共春葩比麗文章節義之合而雙美者也公詩如古風七言律雅饒風致如七言絶氣清骨秀翩翩乎藐姑氷雪矣序文質樸極堪咀嚼而不為爽口之味居然先軰典型篇章雖少諸體具列然一斑寸臠而轉覺盈笥充棟者之無色也昔文山公廷對䇿王公應麟許其忠肝方公孝孺賦紫芝甘露我皇祖見而韙之曰此異人也留以遺後詞章之可覘人品如此即以兹集見忠貞之全何不可哉林君曰夫忠貞之産扵地如江湖然無之而非然亦有氣類焉風俗是也忠貞之揭扵天如日月然無時而非然亦有際㑹焉機緣是也公之大節當文皇而亟稱至神廟而大明而後之感懐悲憤慷慨涕洟神㳺扵公而不得見者􅉨􅉨為之序記詩誄𫝊賛以冩其向慕之衷盖人人一轍矣而傳之者為劉公球為之祠者為朱公祀田而祀之者為王公士翹奉明詔以恤錄者為周公悠皆吉州安福人也今周公鳴以郡別駕視篆吾瑞乃割俸葺其祠康公元穂來令甫下車輙首興教化以表章公為己任旣捐金以竣祠事復亟亟梓其錄二公亦安福人安福為吉州節義之鄉氣類之感良為非偶豈非機緣之竒遘乎闕侯公一元序紀安福之多賢闕西藩長也林君屬余序亦謂余曩守吉州習其氣類今者復值機緣之㑹不可以無言余則安能望侯公然林君之命不敢負也故僣為序其端若夫忠貞事實則先後詩若文已無遺佚而黄陳两先生生平崖畧亦各具本𫝊中無煩贅及矣項維聰序
