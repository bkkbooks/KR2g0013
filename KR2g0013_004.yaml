body:
  text: 忠貞錄後序余讀羅文恭諸書之紀靖難也維時神旗方指寳鼎旋新緬追金川之迎鑾勸進者凡百若而人北平之望風觧組者凡二百若而人乃始扼腕扵壬午諸臣未嘗不泫然而悲曰壯哉卓公非浩然正氣令人有易水蕭蕭意耶夫扶輿之正氣最稱善集集扵松栢則争勁扵霜集扵金石則爭夀扵嶽集扵人心則爭垂不朽扵乾坤若公者洵三十年養士之正氣集扵一人哉説者謂大統之旣正而殺運之未除也痛六尺之奚存撫五宗之倐燼疇不以獻琛者為逹變而碎玉者為拘常矣噫嘻仗神武以恢八夤者原不以沉淵埋嶽之烈而貶聖仗節義以繫九鼎者亦不以升陑誓牧之師而貶賢盖英主頑民總皇天生之以柱宇宙亦各行其是而已矣公之死正公之所以為公哉或又謂公之死也少師與有力焉是正不然公以天挺忠孝其生平之自矢蚤已决矣少負竒徴壯登鼎甲洞天人之𤣥機衍周卲之正𣲖盖通逹似賈之一䟽蹇諤似文之六歌不啻以身兼之况以鄉先逹如許忠簡陳文節軰忠義之灌注已深矣夫安知少師之戕公非以成公也者是正氣之集洵浩然而獨存也與哉肆今煌煌華衮表忠冶城俾公昔日之成虹化碧者一旦褎然與卞將軍並雄寧不可以作怒蛙之氣壯孤鳳之鳴耶先是公之遺文及𫝊記類前令吳門劉公畿業已表章乃嵗逺湮沒今李君䕃昌林君可任寤寐扵公舊矣因奉新令日頴康公之德意遂謀諸經欲重訂以付剞劂余謂公不顧其身與家矣即文之表不表奚顧哉苐正氣之在扶輿人原具有追憶曩日雨花䑓之逰見正學公之墓道標題炳朗又未嘗不為吾卓公哽咽寧忍令其遺文冺冺不可物色乎遂為之詮次且以奉常黄公孝亷陳公并附扵後夫蘭桂異質而齊芳韶武殊音而並美詎非吾卓公之淵源有自而正氣之在吾瑞洵後先輝映如持左劵哉故不自揣其不文而漫叙之用以為正氣之一助云徐一經序
